---
- name: Enabling net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: "net.ipv4.ip_forward"
    value: '1'
    sysctl_set: true
    reload: true
    sysctl_file: "/etc/sysctl.d/k8s.conf"

- name: Add nf_conntrack and br_netfilter kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: 'present'
  loop: "{{ k8s_provision__kernel_modules }}"
